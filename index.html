<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>zy叫我写的</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: "Microsoft YaHei", sans-serif;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #222 0%, #000 100%);
      z-index: 10;
    }

    #startBtn {
      padding: 18px 36px;
      font-size: 24px;
      font-weight: bold;
      color: white;
      background: #ff0055;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    #startBtn:hover {
      transform: scale(1.06);
      box-shadow: 0 0 30px rgba(255, 0, 85, 0.9);
    }

    #stage {
      position: fixed;
      inset: 0;
      display: none;
      background: black;
    }

    #mainVideo {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: black;
    }

    #hint {
      position: fixed;
      left: 18px;
      bottom: 14px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 14px;
      z-index: 5;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="startScreen">
    <button id="startBtn">刀盾去哪里了？</button>
  </div>

  <div id="stage">
    <video id="mainVideo" loop playsinline preload="auto">
      <source src="play.mp4" type="video/mp4" />
      你的浏览器不支持 video 标签。
    </video>
    <div id="hint">点击屏幕可暂停 / 继续</div>
  </div>

  <script>
    const startBtn = document.getElementById("startBtn");
    const startScreen = document.getElementById("startScreen");
    const stage = document.getElementById("stage");
    const video = document.getElementById("mainVideo");

    startBtn.addEventListener("click", async () => {
      startScreen.style.display = "none";
      stage.style.display = "block";

      try {
        await video.play();
      } catch (error) {
        console.log("播放失败：", error);
        alert("视频播放失败，请确认 play.mp4 和 index.html 在同一文件夹里。");
      }
    });

    stage.addEventListener("click", async () => {
      if (video.paused) {
        try {
          await video.play();
        } catch (error) {
          console.log("继续播放失败：", error);
        }
      } else {
        video.pause();
      }
    });
  </script>
</body>
</html>
